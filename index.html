<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Snake Game</title>
        <link rel="stylesheet" href="./style.css" />

    </head>
    <body id="page">
        <h1 id="title">Snake Game</h1>
        <div id="scoreBox">
            <h3 class="score" id="current">Score: 0</h3>
            <h3 class="score" id="highScore">Best: 0</h3>
        </div>
        
        
        
            
        <main id="boardGame">
            <h1 id="over" hidden>GAME OVER</h1>
        </main>
        <section>
            <button class="button" id="stopButton">Stop</button>
            <button class="button" id="continueButton" disabled >Continue</button>
            <button class="button" id="restartButton">Restart</button>
        </section>
       


        <script src="/app.js"></script>
    </body>
</html>
